const STORAGE_KEY = 'alras_mobile_v1';
function loadData() {

const fmtMoney = (n, ccy='AED') => n === 0 ? '—' : new Intl.NumberFormat('en-US', { style: 'currency', currency: ccy, maximumFractionDigits: 0 }).format(n);
const fmtMoneyShort = (n, ccy='AED') => {
  if (n === 0) return '—';
  if (n >= 1000000) return `${ccy} ${(n/1000000).toFixed(1)}M`;
  if (n >= 1000) return `${ccy} ${(n/1000).toFixed(0)}K`;
  return `${ccy} ${n}`;
};
const fmtDate = (d) => new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
const fmtDateShort = (d) => new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
const fmtRelative = (days) => {
  if (days === 0) return 'today';
  if (days === 1) return '1d ago';
  if (days < 30) return `${days}d ago`;
  if (days < 60) return `${Math.floor(days/7)}w ago`;
  return `${Math.floor(days/30)}mo ago`;
};

  const [selectedCompanyId, setSelectedCompanyId] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [showAddCompany, setShowAddCompany] = useState(false);
  const [showActivityModal, setShowActivityModal] = useState(false);
  const [showPMRModal, setShowPMRModal] = useState(false);
  const [showAIModal, setShowAIModal] = useState(null);
  const [showAddFollowup, setShowAddFollowup] = useState(false);
  const [showFilters, setShowFilters] = useState(false);
  const [showMore, setShowMore] = useState(false);
  const [online, setOnline] = useState(navigator.onLine);
  const [filterStatus, setFilterStatus] = useState('All');
  const [filterMarket, setFilterMarket] = useState('All');
  const [filterTier, setFilterTier] = useState('All');
  const [filterHeat, setFilterHeat] = useState('All');

  useEffect(() => { saveData(data); }, [data]);
  useEffect(() => {
    const on = () => setOnline(true); const off = () => setOnline(false);
    window.addEventListener('online', on); window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  const update = (key, fn) => setData(d => ({ ...d, [key]: fn(d[key]) }));
  const addActivity = (a) => update('activities', xs => [{ ...a, id: 'a' + Date.now() }, ...xs]);
  const addPMR = (p) => update('pmrs', xs => [{ ...p, id: 'p' + Date.now() }, ...xs]);
  const addCompany = (c) => update('companies', xs => [{ ...c, id: 'c' + Date.now() }, ...xs]);
  const updateCompany = (id, patch) => update('companies', xs => xs.map(c => c.id === id ? { ...c, ...patch } : c));
  const addFollowup = (f) => update('followups', xs => [{ ...f, id: 'f' + Date.now() }, ...xs]);
  const toggleFollowup = (id) => update('followups', xs => xs.map(f => f.id === id ? { ...f, done: !f.done } : f));
  const updateQuotation = (id, patch) => update('quotations', xs => xs.map(q => q.id === id ? { ...q, ...patch } : q));

  const visibleCompanies = useMemo(() => {
    if (!currentUser) return [];
    if (currentUser.role === 'Admin' || currentUser.role === 'Sales Manager') return data.companies;
    return data.companies.filter(c => c.assignedTo === currentUser.id);
  }, [data.companies, currentUser]);

  const filteredCompanies = useMemo(() => {
    return visibleCompanies.filter(c => {
      if (searchQuery && !c.name.toLowerCase().includes(searchQuery.toLowerCase())
        && !c.primaryContact.name.toLowerCase().includes(searchQuery.toLowerCase())
        && !c.city.toLowerCase().includes(searchQuery.toLowerCase())) return false;
      if (filterStatus !== 'All' && c.status !== filterStatus) return false;
      if (filterMarket !== 'All' && c.market !== filterMarket) return false;
      if (filterTier !== 'All' && c.tier !== filterTier) return false;
      if (filterHeat !== 'All' && c.heat !== filterHeat) return false;
      return true;
    });
  }, [visibleCompanies, searchQuery, filterStatus, filterMarket, filterTier, filterHeat]);

  const selectedCompany = data.companies.find(c => c.id === selectedCompanyId);

  if (!currentUser) return <LoginScreen users={data.users} onLogin={setCurrentUser} />;

  // Render appropriate view
  const renderView = () => {
    if (selectedCompany) return (
      <CompanyDetail
        company={selectedCompany} data={data} currentUser={currentUser}
        onBack={() => setSelectedCompanyId(null)}
        onLogActivity={() => setShowActivityModal(true)}
        onAddPMR={() => setShowPMRModal(true)}
        onAIPrepare={() => setShowAIModal({ kind: 'prepare', company: selectedCompany })}
        onAIDraftEmail={() => setShowAIModal({ kind: 'email', company: selectedCompany })}
        onUpdateCompany={(patch) => updateCompany(selectedCompany.id, patch)}
        onToggleFollowup={toggleFollowup}
        onAddFollowup={() => setShowAddFollowup(true)}
      />
    );
    switch (view) {
      case 'dashboard': return <Dashboard data={data} currentUser={currentUser} visibleCompanies={visibleCompanies} onSelectCompany={setSelectedCompanyId} setView={setView} online={online} />;
      case 'companies': return <CompaniesList companies={filteredCompanies} allCompanies={visibleCompanies} users={data.users} onSelect={setSelectedCompanyId} onAdd={() => setShowAddCompany(true)} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onOpenFilters={() => setShowFilters(true)} filterStatus={filterStatus} filterMarket={filterMarket} filterTier={filterTier} filterHeat={filterHeat} />;
      case 'pipeline': return <PipelineKanban companies={filteredCompanies} users={data.users} onSelect={setSelectedCompanyId} onMove={(id, status) => updateCompany(id, { status })} />;
      case 'followups': return <FollowupsView followups={data.followups} companies={data.companies} users={data.users} currentUser={currentUser} onToggle={toggleFollowup} onSelect={setSelectedCompanyId} />;
      case 'quotations': return <QuotationsView quotations={data.quotations} companies={data.companies} onSelect={setSelectedCompanyId} onUpdate={updateQuotation} />;
      case 'reports': return <ReportsView data={data} currentUser={currentUser} />;
      case 'users': return <UsersView users={data.users} currentUser={currentUser} />;
      case 'settings': return <SettingsView currentUser={currentUser} onReset={() => { setData(DEFAULT_DATA); saveData(DEFAULT_DATA); }} onLogout={() => setCurrentUser(null)} online={online} />;
      default: return null;
    }
  };

  return (
    <div className="min-h-screen bg-stone-50 text-slate-900">
      <div className="pb-20">{renderView()}</div>

      {!selectedCompany && (
        <BottomNav view={view} setView={(v) => { setView(v); setSelectedCompanyId(null); }} currentUser={currentUser} onMore={() => setShowMore(true)} />
      )}

      {showMore && <MoreMenu currentUser={currentUser} onClose={() => setShowMore(false)} onSelect={(v) => { setView(v); setShowMore(false); }} onLogout={() => { setCurrentUser(null); setShowMore(false); }} online={online} />}
      {showAddCompany && <AddCompanyModal users={data.users} onClose={() => setShowAddCompany(false)} onSave={(c) => { addCompany(c); setShowAddCompany(false); }} />}
      {showActivityModal && selectedCompany && <LogActivityModal company={selectedCompany} currentUser={currentUser} onClose={() => setShowActivityModal(false)} onSave={(a) => { addActivity(a); updateCompany(selectedCompany.id, { lastActivity: 0, daysSinceActivity: 0 }); setShowActivityModal(false); }} />}
      {showPMRModal && selectedCompany && <PMRModal company={selectedCompany} currentUser={currentUser} onClose={() => setShowPMRModal(false)} onSave={(p, activitySummary) => { const newActivityId = 'a' + Date.now(); addActivity({ companyId: selectedCompany.id, userId: currentUser.id, type: 'Meeting', date: p.date, summary: activitySummary, durationMin: 90, id: newActivityId }); addPMR({ ...p, activityId: newActivityId }); updateCompany(selectedCompany.id, { heat: p.relationshipHeat, lastActivity: 0, daysSinceActivity: 0 }); setShowPMRModal(false); }} />}
      {showAIModal && <AIAssistantModal kind={showAIModal.kind} company={showAIModal.company} data={data} onClose={() => setShowAIModal(null)} />}
      {showAddFollowup && selectedCompany && <AddFollowupModal companyId={selectedCompany.id} currentUser={currentUser} onClose={() => setShowAddFollowup(false)} onSave={(f) => { addFollowup(f); setShowAddFollowup(false); }} />}
      {showFilters && <FiltersSheet onClose={() => setShowFilters(false)} filterStatus={filterStatus} setFilterStatus={setFilterStatus} filterMarket={filterMarket} setFilterMarket={setFilterMarket} filterTier={filterTier} setFilterTier={setFilterTier} filterHeat={filterHeat} setFilterHeat={setFilterHeat} />}
    </div>
  );
}

// DASHBOARD
// ============================================================
function Dashboard({ data, currentUser, visibleCompanies, onSelectCompany, setView, online }) {
  const myFollowups = data.followups.filter(f => !f.done && (currentUser.role === 'Admin' || currentUser.role === 'Sales Manager' || f.userId === currentUser.id));
  const overdueCount = myFollowups.filter(f => new Date(f.dueDate) < new Date()).length;
  const totalPipeline = visibleCompanies.reduce((s, c) => s + (c.openQuote || 0), 0);
  const activeAccounts = visibleCompanies.filter(c => c.status === 'Active Customer').length;
  const atRisk = visibleCompanies.filter(c => c.heat === 'Red' || (c.heat === 'Amber' && c.daysSinceActivity > 14)).length;
  const dormant = visibleCompanies.filter(c => c.status === 'Dormant').length;

  // Top 5 needs attention
  const needsAttention = [...visibleCompanies]
    .filter(c => c.heat === 'Red' || c.heat === 'Amber')
    .sort((a, b) => b.daysSinceActivity - a.daysSinceActivity)
    .slice(0, 5);

  const recentActivities = data.activities
    .filter(a => visibleCompanies.some(c => c.id === a.companyId))
    .slice(0, 6);

  return (
    <div className="safe-top">
      {/* Header */}
      <header className="bg-slate-900 text-white px-5 pt-6 pb-8 grid-bg relative overflow-hidden">
        <div className="absolute inset-0 bg-gradient-to-br from-slate-900 to-slate-800" />
        <div className="relative z-10">
          <div className="flex items-center justify-between mb-5">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 bg-sky-500 flex items-center justify-center font-display text-sm font-bold">AR</div>
              <div>
                <div className="font-display text-sm font-semibold tracking-tight">AL RAS STEEL</div>
                <div className="font-mono text-[9px] tracking-widest text-slate-400 uppercase">Intelligence</div>
              </div>
            </div>
            <div className={`flex items-center gap-1.5 px-2 py-1 text-[9px] font-mono uppercase tracking-wider ${online ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-300'}`}>
              <Icon name={online ? 'Wifi' : 'WifiOff'} size={11} />
              {online ? 'Online' : 'Offline'}
            </div>
          </div>
          <div className="text-xs text-slate-400 font-mono uppercase tracking-wider">Good {new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 18 ? 'afternoon' : 'evening'}</div>
          <div className="font-display text-2xl font-semibold mt-1">{currentUser.name.split(' ')[0]}</div>
          <div className="text-sm text-slate-300 mt-1">{visibleCompanies.length} accounts · {currentUser.territory}</div>
        </div>
      </header>

      <div className="px-5 -mt-4 relative z-10 space-y-4">
        {/* KPI grid */}
        <div className="grid grid-cols-2 gap-2">
          <KPICard label="Open Pipeline" value={fmtMoneyShort(totalPipeline, 'AED')} accent="sky" mono />
          <KPICard label="Active Customers" value={activeAccounts} sub={`of ${visibleCompanies.length}`} accent="emerald" />
          <KPICard label="At Risk" value={atRisk} sub="needs attention" accent="amber" />
          <KPICard label="Tasks Due" value={myFollowups.length} sub={overdueCount > 0 ? `${overdueCount} overdue` : 'on track'} accent={overdueCount > 0 ? 'red' : 'slate'} />
        </div>

        {/* Quick actions */}
        <div className="grid grid-cols-4 gap-2">
          <QuickAction icon="Bell" label="Tasks" badge={myFollowups.length} onClick={() => setView('followups')} />
          <QuickAction icon="TrendingUp" label="Pipeline" onClick={() => setView('pipeline')} />
          <QuickAction icon="FileText" label="Quotes" onClick={() => setView('quotations')} />
          <QuickAction icon="Building2" label="Accounts" onClick={() => setView('companies')} />
        </div>

        {/* Needs attention */}
        {needsAttention.length > 0 && (
          <section className="bg-white border border-slate-200">
            <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
              <div>
                <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Needs Attention</div>
                <div className="font-display text-base font-semibold">Cold relationships</div>
              </div>
              <Icon name="Flame" size={18} className="text-amber-500" />
            </div>
            <div>
              {needsAttention.map(c => {
                const heat = HEAT_SCORES[c.heat];
                return (
                  <button key={c.id} onClick={() => onSelectCompany(c.id)} className="w-full flex items-center gap-3 px-4 py-3 border-b border-slate-100 last:border-b-0 active:bg-slate-50 transition text-left">
                    <div className={`w-2 h-2 ${heat.bg} flex-shrink-0`} />
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium truncate">{c.name}</div>
                      <div className="text-[11px] text-slate-500 font-mono">{c.city} · {fmtRelative(c.daysSinceActivity)}</div>
                    </div>
                    <span className={`px-2 py-0.5 text-[10px] font-mono uppercase ${STATUS_COLORS[c.status].bg} ${STATUS_COLORS[c.status].text}`}>{c.status}</span>
                  </button>
                );
              })}
            </div>
          </section>
        )}

        {/* Recent activity */}
        <section className="bg-white border border-slate-200">
          <div className="px-4 py-3 border-b border-slate-100">
            <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Activity Feed</div>
            <div className="font-display text-base font-semibold">Latest interactions</div>
          </div>
          <div>
            {recentActivities.map(a => {
              const c = data.companies.find(c => c.id === a.companyId);
              const u = data.users.find(u => u.id === a.userId);
              return (
                <button key={a.id} onClick={() => c && onSelectCompany(c.id)} className="w-full flex items-start gap-3 px-4 py-3 border-b border-slate-100 last:border-b-0 active:bg-slate-50 transition text-left">
                  <div className="w-8 h-8 bg-slate-100 flex items-center justify-center flex-shrink-0">
                    <ActivityIconMobile type={a.type} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium truncate">{c?.name}</div>
                    <div className="text-[11px] text-slate-500 line-clamp-2">{a.summary}</div>
                    <div className="text-[10px] text-slate-400 font-mono uppercase tracking-wider mt-0.5">{a.type} · {u?.avatar} · {fmtDateShort(a.date)}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </section>

        {/* Dormant alert */}
        {dormant > 0 && (currentUser.role === 'Admin' || currentUser.role === 'Sales Manager') && (
          <div className="bg-red-50 border border-red-100 p-4 flex items-start gap-3">
            <Icon name="AlertCircle" size={18} className="text-red-600 flex-shrink-0 mt-0.5" />
            <div>
              <div className="text-sm font-medium text-red-900">{dormant} dormant {dormant === 1 ? 'account' : 'accounts'}</div>
              <div className="text-[12px] text-red-700 mt-0.5">Director-level action required to re-engage.</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function KPICard({ label, value, sub, accent='slate', mono }) {
  const colors = {
    slate:   'border-l-slate-400',
    sky:     'border-l-sky-500',
    emerald: 'border-l-emerald-500',
    amber:   'border-l-amber-500',
    red:     'border-l-red-500',
  };
  return (
    <div className={`bg-white border border-slate-200 border-l-4 ${colors[accent]} p-3`}>
      <div className="text-[9px] font-mono uppercase tracking-widest text-slate-500">{label}</div>
      <div className={`mt-1 font-display text-lg font-semibold ${mono ? 'font-mono' : ''}`}>{value}</div>
      {sub && <div className="text-[10px] text-slate-500 font-mono mt-0.5">{sub}</div>}
    </div>
  );
}

function QuickAction({ icon, label, badge, onClick }) {
  return (
    <button onClick={onClick} className="bg-white border border-slate-200 p-3 flex flex-col items-center gap-1.5 active:bg-slate-50 transition relative">
      {badge > 0 && <div className="absolute top-1.5 right-1.5 min-w-[16px] h-4 px-1 bg-red-500 text-white text-[9px] font-mono font-semibold flex items-center justify-center">{badge}</div>}
      <Icon name={icon} size={18} className="text-slate-700" />
      <span className="text-[10px] font-mono uppercase tracking-wider text-slate-600">{label}</span>
    </button>
  );
}

function ActivityIconMobile({ type }) {
  const map = { 'Call': 'Phone', 'Email': 'Mail', 'WhatsApp': 'MessageSquare', 'Meeting': 'Users', 'Site Visit': 'MapPin', 'Note': 'Edit3', 'Quotation Sent': 'FileText' };
  return <Icon name={map[type] || 'Activity'} size={14} className="text-slate-600" />;
}

// COMPANIES LIST
// ============================================================
function CompaniesList({ companies, allCompanies, users, onSelect, onAdd, searchQuery, setSearchQuery, onOpenFilters, filterStatus, filterMarket, filterTier, filterHeat }) {
  const activeFilters = [filterStatus, filterMarket, filterTier, filterHeat].filter(f => f !== 'All').length;
  const exportCsv = () => {
    const headers = ['Company','Market','City','Tier','Status','Heat','Assigned To','Contact','Phone','Email','Days Since Activity','Open Quote'];
    const rows = companies.map(c => {
      const owner = users.find(u => u.id === c.assignedTo);
      return [c.name, c.market, c.city, c.tier, c.status, c.heat, owner?.name || '', c.primaryContact.name, c.primaryContact.phone, c.primaryContact.email, c.daysSinceActivity, c.openQuote || 0];
    });
    const csv = [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'alras-companies-mobile.csv';
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="safe-top">
      <div className="bg-white border-b border-slate-200 px-5 pt-4 pb-3 sticky top-0 z-20">
        <div className="flex items-center justify-between mb-3">
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">{companies.length} of {allCompanies.length}</div>
            <h1 className="font-display text-xl font-semibold">Accounts</h1>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={exportCsv} className="w-9 h-9 border border-slate-200 bg-white text-slate-700 flex items-center justify-center active:bg-slate-50 transition" aria-label="Export companies">
              <Icon name="Download" size={17} />
            </button>
            <button onClick={onAdd} className="w-9 h-9 bg-slate-900 text-white flex items-center justify-center active:bg-slate-800 transition" aria-label="Add company">
              <Icon name="Plus" size={18} />
            </button>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex-1 relative">
            <Icon name="Search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
            <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search companies, contacts, cities..." className="w-full pl-9 pr-3 py-2.5 bg-stone-50 border border-slate-200 text-sm focus:outline-none focus:border-slate-900 focus:bg-white" />
          </div>
          <button onClick={onOpenFilters} className={`px-3 py-2.5 border text-sm font-mono uppercase tracking-wider relative ${activeFilters > 0 ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-200'}`}>
            <Icon name="Filter" size={14} />
            {activeFilters > 0 && <div className="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 bg-sky-500 text-white text-[9px] font-mono font-semibold flex items-center justify-center">{activeFilters}</div>}
          </button>
        </div>
      </div>

      <div className="p-3 space-y-2">
        {companies.length === 0 ? (
          <div className="text-center py-12 text-slate-400">
            <Icon name="Building2" size={36} className="mx-auto opacity-40" />
            <div className="text-sm mt-3">No accounts match.</div>
          </div>
        ) : companies.map(c => {
          const owner = users.find(u => u.id === c.assignedTo);
          const heat = HEAT_SCORES[c.heat];
          const stat = STATUS_COLORS[c.status];
          return (
            <button key={c.id} onClick={() => onSelect(c.id)} className="w-full bg-white border border-slate-200 p-4 active:bg-slate-50 transition text-left animate-slide-up">
              <div className="flex items-start gap-3">
                <div className={`w-1 self-stretch ${heat.bg} flex-shrink-0`} />
                <div className="flex-1 min-w-0">
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex-1 min-w-0">
                      <div className="font-display text-sm font-semibold leading-tight">{c.name}</div>
                      <div className="text-[11px] text-slate-500 font-mono mt-0.5">{c.market} · {c.city}</div>
                    </div>
                    <span className={`px-2 py-0.5 text-[10px] font-mono uppercase tracking-wide ${stat.bg} ${stat.text} flex-shrink-0`}>{c.status === 'Active Customer' ? 'Active' : c.status}</span>
                  </div>
                  <div className="mt-3 flex items-center gap-3 text-[11px] text-slate-500">
                    <div className="flex items-center gap-1"><div className={`w-1.5 h-1.5 ${heat.bg}`} /><span className="font-mono uppercase tracking-wider">{c.tier.split(' ')[0]}</span></div>
                    <span className="font-mono">{fmtRelative(c.daysSinceActivity)}</span>
                    {c.openQuote > 0 && <span className="font-mono ml-auto text-slate-900 font-semibold">{fmtMoneyShort(c.openQuote, c.currency)}</span>}
                  </div>
                  <div className="mt-2 flex items-center gap-2 text-[11px] text-slate-500">
                    <Icon name="User" size={12} />
                    <span className="truncate">{c.primaryContact.name}</span>
                    <span className="ml-auto font-mono text-[10px]">{owner?.avatar}</span>
                  </div>
                </div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function FiltersSheet({ onClose, filterStatus, setFilterStatus, filterMarket, setFilterMarket, filterTier, setFilterTier, filterHeat, setFilterHeat }) {
  const reset = () => { setFilterStatus('All'); setFilterMarket('All'); setFilterTier('All'); setFilterHeat('All'); };
  return (
    <div className="fixed inset-0 z-50 flex flex-col justify-end animate-fade-in" onClick={onClose}>
      <div className="absolute inset-0 bg-slate-900/40" />
      <div className="relative bg-white animate-sheet-up max-h-[85vh] overflow-y-auto safe-bottom" onClick={(e) => e.stopPropagation()}>
        <div className="px-5 pt-4 pb-3 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
          <div className="font-display text-lg font-semibold">Filters</div>
          <button onClick={onClose} className="p-2"><Icon name="X" size={20} /></button>
        </div>
        <div className="px-5 py-4 space-y-5">
          <FilterChips label="Status" value={filterStatus} onChange={setFilterStatus} options={['All', ...STATUS_VALUES]} />
          <FilterChips label="Market" value={filterMarket} onChange={setFilterMarket} options={['All', ...MARKETS]} />
          <FilterChips label="Tier" value={filterTier} onChange={setFilterTier} options={['All', ...TIERS]} />
          <FilterChips label="Heat Score" value={filterHeat} onChange={setFilterHeat} options={['All', 'Green', 'Amber', 'Red']} />
        </div>
        <div className="px-5 py-4 border-t border-slate-100 flex gap-3 sticky bottom-0 bg-white">
          <button onClick={reset} className="flex-1 py-3 border border-slate-200 text-sm font-medium active:bg-slate-50">Reset</button>
          <button onClick={onClose} className="flex-1 py-3 bg-slate-900 text-white text-sm font-medium active:bg-slate-800">Apply</button>
        </div>
      </div>
    </div>
  );
}

function FilterChips({ label, value, onChange, options }) {
  return (
    <div>
      <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500 mb-2">{label}</div>
      <div className="flex flex-wrap gap-2">
        {options.map(o => (
          <button key={o} onClick={() => onChange(o)} className={`px-3 py-1.5 text-[12px] border transition ${value === o ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-200'}`}>{o}</button>
        ))}
      </div>
    </div>
  );
}

// COMPANY DETAIL
// ============================================================
function CompanyDetail({ company, data, currentUser, onBack, onLogActivity, onAddPMR, onAIPrepare, onAIDraftEmail, onUpdateCompany, onToggleFollowup, onAddFollowup }) {
  const [tab, setTab] = useState('overview');
  const activities = data.activities.filter(a => a.companyId === company.id).sort((a, b) => b.date.localeCompare(a.date));
  const pmrs = data.pmrs.filter(p => p.companyId === company.id).sort((a, b) => b.date.localeCompare(a.date));
  const lastPMR = pmrs[0];
  const followups = data.followups.filter(f => f.companyId === company.id);
  const quotes = data.quotations.filter(q => q.companyId === company.id);
  const owner = data.users.find(u => u.id === company.assignedTo);
  const canEdit = currentUser.role === 'Admin' || currentUser.role === 'Sales Manager' || company.assignedTo === currentUser.id;
  const heat = HEAT_SCORES[company.heat];
  const stat = STATUS_COLORS[company.status];

  const tabs = [
    { id: 'overview', label: 'Overview' },
    { id: 'activity', label: 'Activity', count: activities.length },
    { id: 'pmr',      label: 'PMR',      count: pmrs.length },
    { id: 'tasks',    label: 'Tasks',    count: followups.filter(f => !f.done).length },
    { id: 'quotes',   label: 'Quotes',   count: quotes.length },
    { id: 'details',  label: 'Details' },
  ];

  return (
    <div className="safe-top min-h-screen bg-stone-50 pb-24">
      {/* Header */}
      <div className="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div className="px-4 py-3 flex items-center gap-2">
          <button onClick={onBack} className="p-2 -ml-2 active:bg-slate-100"><Icon name="ArrowLeft" size={20} /></button>
          <div className="flex-1 min-w-0">
            <div className="font-display text-base font-semibold truncate">{company.name}</div>
            <div className="text-[11px] text-slate-500 font-mono">{company.market} · {company.city}</div>
          </div>
          <button onClick={() => window.location.href = `tel:${company.primaryContact.phone}`} className="p-2 active:bg-slate-100"><Icon name="Phone" size={18} /></button>
        </div>

        {/* Status bar */}
        <div className="px-4 py-2 flex items-center gap-2 border-t border-slate-100">
          <span className={`px-2 py-0.5 text-[10px] font-mono uppercase tracking-wide ${stat.bg} ${stat.text}`}>{company.status}</span>
          <span className={`inline-flex items-center gap-1 px-2 py-0.5 text-[10px] font-mono uppercase tracking-wide ${heat.color} bg-stone-100`}>
            <div className={`w-1.5 h-1.5 ${heat.bg}`} />{company.heat}
          </span>
          <span className="text-[10px] font-mono uppercase text-slate-500 tracking-wide">{company.tier.split(' ')[0]}</span>
          <span className="text-[10px] font-mono uppercase text-slate-500 tracking-wide ml-auto">{owner?.avatar}</span>
        </div>

        {/* Tabs */}
        <div className="border-t border-slate-100 overflow-x-auto no-scrollbar">
          <div className="flex">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-3 text-xs font-mono uppercase tracking-wider whitespace-nowrap relative ${tab === t.id ? 'text-slate-900' : 'text-slate-500'}`}>
                {tab === t.id && <div className="absolute bottom-0 left-3 right-3 h-0.5 bg-slate-900" />}
                {t.label}
                {t.count > 0 && <span className="ml-1.5 text-[10px] text-slate-400">({t.count})</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Tab content */}
      <div className="p-4 space-y-4">
        {tab === 'overview' && <OverviewTab company={company} lastPMR={lastPMR} activities={activities.slice(0, 3)} quotes={quotes} owner={owner} canEdit={canEdit} onUpdate={onUpdateCompany} />}
        {tab === 'activity' && <ActivityTab activities={activities} users={data.users} />}
        {tab === 'pmr' && <PMRTab pmrs={pmrs} users={data.users} />}
        {tab === 'tasks' && <TasksTab followups={followups} companyId={company.id} users={data.users} currentUser={currentUser} onToggle={onToggleFollowup} onAdd={onAddFollowup} canEdit={canEdit} />}
        {tab === 'quotes' && <QuotesTab quotes={quotes} />}
        {tab === 'details' && <DetailsTab company={company} canEdit={canEdit} onUpdate={onUpdateCompany} users={data.users} />}
      </div>

      {/* Floating action bar */}
      {canEdit && (
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-3 py-3 grid grid-cols-4 gap-2 z-40" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom) + 0.75rem)' }}>
          <FabBtn icon="Activity" label="Log" onClick={onLogActivity} />
          <FabBtn icon="ClipboardList" label="PMR" onClick={onAddPMR} />
          <FabBtn icon="Sparkles" label="Brief" onClick={onAIPrepare} accent />
          <FabBtn icon="Mail" label="Email" onClick={onAIDraftEmail} accent />
        </div>
      )}
    </div>
  );
}

function FabBtn({ icon, label, onClick, accent }) {
  return (
    <button onClick={onClick} className={`flex flex-col items-center gap-1 py-2 transition active:bg-slate-50 ${accent ? 'text-sky-600' : 'text-slate-700'}`}>
      <Icon name={icon} size={18} />
      <span className="text-[10px] font-mono uppercase tracking-wider">{label}</span>
    </button>
  );
}

function OverviewTab({ company, lastPMR, activities, quotes, owner, canEdit, onUpdate }) {

        <div className="text-xs text-slate-500">{company.primaryContact.title}</div>

            <Icon name="Phone" size={14} /> Call
          </a>

          </a>
        </div>
        <div className="mt-3 pt-3 border-t border-slate-100 space-y-1.5">
          <div className="flex items-center gap-2 text-xs text-slate-600 font-mono">

          </div>
          <div className="flex items-center gap-2 text-xs text-slate-600 font-mono">
            <Icon name="Mail" size={12} className="text-slate-400" />{company.primaryContact.email}

        </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-2">
        <Stat label="Last Activity" value={fmtRelative(company.daysSinceActivity)} mono />
        <Stat label="Open Quote" value={fmtMoneyShort(company.openQuote, company.currency)} mono />
        <Stat label="Owner" value={owner?.avatar || '—'} mono />
      </div>

      {/* Heat score panel */}
      <div className="bg-white border border-slate-200 p-4">
        <div className="flex items-center justify-between mb-3">
          <div>
            <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Relationship Heat</div>
            <div className="font-display text-base font-semibold">{heat.desc}</div>
          </div>
          <div className={`w-12 h-12 ${heat.bg} flex items-center justify-center`}>
            <span className="text-white font-display text-sm font-bold">{company.heat[0]}</span>
          </div>
        </div>
        {canEdit && (
          <div className="flex gap-1.5">
            {['Green', 'Amber', 'Red'].map(h => (
              <button key={h} onClick={() => onUpdate({ heat: h })} className={`flex-1 py-2 text-[11px] font-mono uppercase tracking-wider border ${company.heat === h ? `${HEAT_SCORES[h].bg} text-white border-transparent` : 'bg-white border-slate-200 text-slate-600'}`}>
                {h}
              </button>
            ))}
          </div>

      </div>

      {/* Last PMR digest */}
      {lastPMR && (
        <div className="bg-white border border-slate-200 p-4">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Last PMR · {fmtDate(lastPMR.date)}</div>
            {lastPMR.directorActionRequired && <span className="px-1.5 py-0.5 bg-red-50 text-red-700 text-[9px] font-mono uppercase tracking-wider">Director Action</span>}
          </div>
          <div className="font-display text-sm font-semibold mb-2">Key Notes</div>
          <p className="text-xs text-slate-700 leading-relaxed">{lastPMR.keyNotes}</p>
          {lastPMR.nextSteps && (

          <div className="flex flex-wrap gap-1.5">

function Stat({ label, value, mono }) {
  return (
    <div className="bg-white border border-slate-200 p-3">
      <div className="text-[9px] font-mono uppercase tracking-widest text-slate-500">{label}</div>
      <div className={`mt-1 text-sm font-semibold ${mono ? 'font-mono' : ''}`}>{value}</div>
    </div>
  );
}

function ActivityTab({ activities, users }) {
  if (activities.length === 0) return <EmptyState icon="Activity" text="No activity logged yet." />;
  return (
    <div className="space-y-2">
      {activities.map(a => {
        const u = users.find(u => u.id === a.userId);
        return (
          <div key={a.id} className="bg-white border border-slate-200 p-3 flex gap-3">
            <div className="w-8 h-8 bg-slate-100 flex items-center justify-center flex-shrink-0">
              <ActivityIconMobile type={a.type} />
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between gap-2">
                <span className="text-[10px] font-mono uppercase tracking-wider text-slate-500">{a.type}</span>
                <span className="text-[10px] font-mono text-slate-400">{fmtDateShort(a.date)}</span>
              </div>
              <p className="text-sm text-slate-800 mt-1">{a.summary}</p>
              <div className="text-[10px] font-mono text-slate-400 mt-1.5">{u?.name} {a.durationMin > 0 && `· ${a.durationMin}min`}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PMRTab({ pmrs, users }) {
  if (pmrs.length === 0) return <EmptyState icon="ClipboardList" text="No post-meeting reports yet." sub="Log one after your next meeting to build relationship intelligence." />;
  return (
    <div className="space-y-3">
      {pmrs.map(p => {
        const u = users.find(u => u.id === p.userId);
        const heat = HEAT_SCORES[p.relationshipHeat];
        return (
          <div key={p.id} className="bg-white border border-slate-200 p-4">
            <div className="flex items-center justify-between mb-3">
              <div>
                <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">PMR</div>
                <div className="font-display text-sm font-semibold">{fmtDate(p.date)} · {u?.name}</div>
              </div>
              <div className={`inline-flex items-center gap-1 px-2 py-0.5 text-[10px] font-mono uppercase ${heat.color} bg-stone-100`}>
                <div className={`w-1.5 h-1.5 ${heat.bg}`} />{p.relationshipHeat}
              </div>
            </div>

            {p.directorActionRequired && (
              <div className="mb-3 px-3 py-2 bg-red-50 border-l-2 border-red-500">
                <div className="text-[10px] font-mono uppercase tracking-wider text-red-700 mb-0.5">Director Action Required</div>
                <p className="text-xs text-red-900">{p.directorActionReason}</p>
              </div>
            )}

            <div className="space-y-2.5 text-xs">
              <PMRField label="Key Notes" value={p.keyNotes} />
              <PMRField label="Next Steps" value={p.nextSteps} />
              {p.competitorsMentioned?.length > 0 && <PMRTags label="Competitors" items={p.competitorsMentioned} accent="amber" />}
              {p.productsDiscussed?.length > 0 && <PMRTags label="Products Discussed" items={p.productsDiscussed} accent="sky" />}
              {p.complianceRequirements?.length > 0 && <PMRTags label="Compliance" items={p.complianceRequirements} accent="emerald" />}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PMRField({ label, value }) {
  if (!value) return null;
  return (
    <div>
      <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500 mb-1">{label}</div>
      <p className="text-slate-800 leading-relaxed">{value}</p>
    </div>
  );
}

function PMRTags({ label, items, accent }) {
  const cls = { amber: 'bg-amber-50 text-amber-700', sky: 'bg-sky-50 text-sky-700', emerald: 'bg-emerald-50 text-emerald-700' }[accent];
  return (
    <div>
      <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500 mb-1">{label}</div>
      <div className="flex flex-wrap gap-1">

  return (

          <div className={`w-1.5 h-1.5 ${priorityColor}`} />

          <span className="text-[10px] font-mono text-slate-400 ml-auto">{fmtDateShort(f.dueDate)}</span>

// ============================================================
// FOLLOW-UPS VIEW
// ============================================================
function FollowupsView({ followups, companies, users, currentUser, onToggle, onSelect }) {
  const visible = (currentUser.role === 'Admin' || currentUser.role === 'Sales Manager')
    ? followups
    : followups.filter(f => f.userId === currentUser.id);

  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate() + 7);

  const open = visible.filter(f => !f.done);
  const overdue = open.filter(f => new Date(f.dueDate) < today);
  const todayItems = open.filter(f => { const d = new Date(f.dueDate); return d >= today && d < tomorrow; });
  const thisWeek = open.filter(f => { const d = new Date(f.dueDate); return d >= tomorrow && d < weekEnd; });
  const later = open.filter(f => new Date(f.dueDate) >= weekEnd);
  const completed = visible.filter(f => f.done);

  return (
    <div className="safe-top">
      <div className="bg-white border-b border-slate-200 px-5 pt-4 pb-3 sticky top-0 z-20">
        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">{open.length} open · {completed.length} done</div>
        <h1 className="font-display text-xl font-semibold">Follow-ups</h1>
      </div>

      <div className="p-3 space-y-4">
        <FollowupGroup label="Overdue" items={overdue} color="red" companies={companies} users={users} onToggle={onToggle} onSelect={onSelect} />
        <FollowupGroup label="Today" items={todayItems} color="amber" companies={companies} users={users} onToggle={onToggle} onSelect={onSelect} />
        <FollowupGroup label="This Week" items={thisWeek} color="sky" companies={companies} users={users} onToggle={onToggle} onSelect={onSelect} />
        <FollowupGroup label="Later" items={later} color="slate" companies={companies} users={users} onToggle={onToggle} onSelect={onSelect} />
        {completed.length > 0 && <FollowupGroup label="Completed" items={completed} color="emerald" companies={companies} users={users} onToggle={onToggle} onSelect={onSelect} />}
      </div>
    </div>
  );
}

function FollowupGroup({ label, items, color, companies, users, onToggle, onSelect }) {
  if (items.length === 0) return null;
  const colorCls = { red: 'text-red-600', amber: 'text-amber-600', sky: 'text-sky-600', slate: 'text-slate-600', emerald: 'text-emerald-600' }[color];
  return (
    <div>
      <div className={`text-[10px] font-mono uppercase tracking-widest mb-2 ${colorCls}`}>{label} · {items.length}</div>
      <div className="space-y-2">
        {items.map(f => <FollowupCard key={f.id} f={f} users={users} onToggle={onToggle} companies={companies} onSelect={onSelect} />)}
      </div>
    </div>
  );
}

  const totals = {
    Pending: quotations.filter(q => q.status === 'Pending').reduce((s, q) => s + q.amount, 0),

        </div>
        <div className="flex gap-1.5 mt-3 overflow-x-auto no-scrollbar">
          {['All', 'Pending', 'Won', 'Lost'].map(s => (
            <button key={s} onClick={() => setFilter(s)} className={`px-3 py-1.5 text-[12px] whitespace-nowrap border ${filter === s ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-200 text-slate-600'}`}>
              {s}

                <div className="mt-2 pt-2 border-t border-slate-100 flex gap-2">

// ============================================================
function ReportsView({ data, currentUser }) {
  const byMarket = MARKETS.map(m => {
    const cs = data.companies.filter(c => c.market === m);
    return { market: m, count: cs.length, pipeline: cs.reduce((s, c) => s + c.openQuote, 0) };
  });
  const byTier = TIERS.map(t => ({ tier: t, count: data.companies.filter(c => c.tier === t).length }));
  const byHeat = ['Green', 'Amber', 'Red'].map(h => ({ heat: h, count: data.companies.filter(c => c.heat === h).length }));
  const byOwner = data.users.filter(u => u.role === 'Sales Executive').map(u => {
    const cs = data.companies.filter(c => c.assignedTo === u.id);
    const pipeline = cs.reduce((s, c) => s + c.openQuote, 0);
    const activeCount = cs.filter(c => c.status === 'Active Customer').length;
    return { user: u, count: cs.length, pipeline, activeCount };
  });
  const coaching = data.users.filter(u => u.role === 'Sales Executive').map(u => {
    const userPmrs = data.pmrs.filter(p => p.userId === u.id);
    const recentRedAmber = userPmrs.filter(p => p.relationshipHeat === 'Red' || p.relationshipHeat === 'Amber').length;
    const directorFlags = userPmrs.filter(p => p.directorActionRequired).length;
    return { user: u, recentRedAmber, directorFlags, totalPMRs: userPmrs.length };
  }).filter(row => row.recentRedAmber > 0 || row.directorFlags > 0);
  const wonValue = data.quotations.filter(q => q.status === 'Won').reduce((s, q) => s + q.amount, 0);
  const lostValue = data.quotations.filter(q => q.status === 'Lost').reduce((s, q) => s + q.amount, 0);
  const winRate = wonValue + lostValue > 0 ? (wonValue / (wonValue + lostValue) * 100).toFixed(1) : '—';

  const maxMarketCount = Math.max(...byMarket.map(m => m.count));
  const maxOwnerCount = Math.max(...byOwner.map(o => o.count));

  return (
    <div className="safe-top">
      <div className="bg-white border-b border-slate-200 px-5 pt-4 pb-3 sticky top-0 z-20">
        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">Management view</div>
        <h1 className="font-display text-xl font-semibold">Reports</h1>
      </div>

      <div className="p-3 space-y-3">
        <div className="grid grid-cols-2 gap-2">
          <KPICard label="Win Rate" value={`${winRate}${winRate !== '—' ? '%' : ''}`} accent="emerald" mono />
          <KPICard label="Won Value" value={fmtMoneyShort(wonValue, 'AED')} accent="sky" mono />
        </div>

        <Section title="By Market">
          {byMarket.map(m => (
            <div key={m.market} className="flex items-center gap-3 py-2 border-b border-slate-100 last:border-0">
              <div className="w-20 text-xs font-medium">{m.market}</div>
              <div className="flex-1 h-2 bg-stone-100 relative">
                <div className="absolute inset-y-0 left-0 bg-sky-500" style={{ width: `${(m.count / maxMarketCount) * 100}%` }} />
              </div>
              <div className="w-8 text-right text-xs font-mono">{m.count}</div>
              <div className="w-20 text-right text-[10px] font-mono text-slate-500">{fmtMoneyShort(m.pipeline, 'AED')}</div>
            </div>
          ))}
        </Section>

        <Section title="By Tier">
          {byTier.map(t => (
            <div key={t.tier} className="flex items-center justify-between py-2 border-b border-slate-100 last:border-0">
              <div className="text-xs">{t.tier}</div>
              <div className="font-mono text-xs font-semibold">{t.count}</div>
            </div>
          ))}
        </Section>

        <Section title="Relationship Heat">
          <div className="grid grid-cols-3 gap-2">
            {byHeat.map(h => {
              const heat = HEAT_SCORES[h.heat];
              return (
                <div key={h.heat} className="bg-stone-50 p-3 text-center">
                  <div className={`w-3 h-3 ${heat.bg} mx-auto mb-1`} />
                  <div className="text-[10px] font-mono uppercase tracking-wider text-slate-500">{h.heat}</div>
                  <div className="font-display text-lg font-semibold mt-0.5">{h.count}</div>
                </div>
              );
            })}
          </div>
        </Section>

        <Section title="By Sales Executive">
          {byOwner.map(o => (
            <div key={o.user.id} className="py-2.5 border-b border-slate-100 last:border-0">
              <div className="flex items-center gap-2.5">
                <div className="w-8 h-8 bg-slate-900 text-white flex items-center justify-center font-mono text-[10px] font-semibold flex-shrink-0">{o.user.avatar}</div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-medium truncate">{o.user.name}</div>
                  <div className="text-[10px] font-mono text-slate-500">{o.user.territory}</div>
                </div>
                <div className="text-right">
                  <div className="font-mono text-xs font-semibold">{o.count}</div>
                  <div className="text-[10px] font-mono text-slate-500">{o.activeCount} active</div>
                </div>
              </div>
              <div className="flex items-center gap-3 mt-2">
                <div className="flex-1 h-1.5 bg-stone-100 relative">
                  <div className="absolute inset-y-0 left-0 bg-slate-700" style={{ width: `${(o.count / maxOwnerCount) * 100}%` }} />
                </div>
                <div className="text-[10px] font-mono text-slate-600">{fmtMoneyShort(o.pipeline, 'AED')}</div>
              </div>
            </div>
          ))}
        </Section>

        <Section title="Who Needs Coaching?">
          <div className="text-[11px] text-slate-500 mb-2">Salespeople with patterns of cold heat or director flags</div>
          {coaching.length === 0 ? (
            <div className="py-4 text-center text-sm text-slate-400">No coaching patterns surfaced.</div>
          ) : coaching.map(row => (
            <div key={row.user.id} className="py-2.5 border-b border-slate-100 last:border-0 flex items-center justify-between gap-3">
              <div className="flex items-center gap-2.5 min-w-0">
                <div className="w-8 h-8 bg-slate-100 flex items-center justify-center font-mono text-[10px] font-semibold text-slate-600 flex-shrink-0">{row.user.avatar}</div>
                <div className="min-w-0">
                  <div className="text-xs font-medium truncate">{row.user.name}</div>
                  <div className="text-[10px] text-slate-500 font-mono">{row.user.territory}</div>
                </div>
              </div>
              <div className="text-right text-[10px] font-mono">
                <div className="text-red-600">{row.directorFlags} director flag{row.directorFlags !== 1 ? 's' : ''}</div>
                <div className="text-amber-600">{row.recentRedAmber} of {row.totalPMRs} PMRs amber/red</div>
              </div>
            </div>
          ))}
        </Section>
      </div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <section className="bg-white border border-slate-200">
      <div className="px-4 py-2.5 border-b border-slate-100">
        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">{title}</div>
      </div>
      <div className="px-4 py-2">{children}</div>
    </section>
  );
}

function AIAssistantModal({ kind, company, data, onClose }) {
  const [loading, setLoading] = useState(true);
  const [content, setContent] = useState('');

  useEffect(() => {
    setLoading(true);
    const activities = data.activities.filter(a => a.companyId === company.id);
    const pmrs = data.pmrs.filter(p => p.companyId === company.id).sort((a, b) => b.date.localeCompare(a.date));
    const quotes = data.quotations.filter(q => q.companyId === company.id);
    const owner = data.users.find(u => u.id === company.assignedTo);
    const t = setTimeout(() => {
      setContent(kind === 'prepare' ? buildPrepareBriefing(company, activities, pmrs[0], quotes, owner) : buildEmailDraft(company, activities, pmrs[0], owner));
      setLoading(false);
    }, 800);
    return () => clearTimeout(t);
  }, [kind, company, data]);

  const copy = () => { navigator.clipboard.writeText(content); };

  return (
    <ModalShell title={kind === 'prepare' ? 'Meeting Briefing' : 'Email Draft'} subtitle={`AI · ${company.name}`} onClose={onClose}>
      <div className="bg-slate-900 text-slate-100 px-4 py-3 -mx-5 -mt-5 mb-4">
        <div className="text-[10px] font-mono uppercase tracking-widest text-sky-300">Powered by Claude - claude-sonnet-4-6</div>
        <div className="text-xs text-slate-400 mt-1">Context auto-assembled from company record, last 10 activities, most recent PMR, open quotations, and market intelligence.</div>
      </div>
      {loading ? (
        <div className="py-12 text-center">
          <Icon name="Sparkles" size={28} className="mx-auto text-sky-500 animate-pulse" />
          <div className="text-xs font-mono uppercase tracking-widest text-slate-500 mt-3">Synthesising intelligence...</div>
        </div>
      ) : (
        <div className="space-y-3">
          <div className="bg-stone-50 border border-slate-200 p-4">
            <pre className="text-xs whitespace-pre-wrap font-mono leading-relaxed text-slate-800">{content}</pre>
          </div>
          <div className="flex gap-2 sticky bottom-0 bg-white pt-2">
            <button onClick={copy} className="flex-1 py-3 border border-slate-200 text-sm font-medium flex items-center justify-center gap-2"><Icon name="Check" size={14} /> Copy</button>
            <button onClick={onClose} className="flex-1 py-3 bg-slate-900 text-white text-sm font-medium">Done</button>
          </div>
        </div>
      )}
    </ModalShell>
  );
}

function buildPrepareBriefing(company, activities, lastPMR, quotes, owner) {
  const recent = activities.slice(0, 3);
  const pendingQuotes = quotes.filter(q => q.status === 'Pending');
  let s = `MEETING BRIEFING\n${company.name} · ${fmtDate(new Date())}\n\n`;
  s += `RELATIONSHIP STATUS\n  Status: ${company.status}\n  Heat: ${company.heat} (${HEAT_SCORES[company.heat].desc})\n  Tier: ${company.tier}\n  Owner: ${owner?.name || '—'}\n  Last activity: ${fmtRelative(company.daysSinceActivity)}\n\n`;
  s += `PRIMARY CONTACT\n  ${company.primaryContact.name} — ${company.primaryContact.title}\n  ${company.primaryContact.phone} · ${company.primaryContact.email}\n\n`;
  if (lastPMR) {
    s += `LAST PMR (${fmtDate(lastPMR.date)})\n  ${lastPMR.keyNotes}\n`;
    if (lastPMR.nextSteps) s += `\n  NEXT STEPS\n  ${lastPMR.nextSteps}\n`;
    if (lastPMR.directorActionRequired) s += `\n  ⚠ DIRECTOR ACTION FLAGGED\n  ${lastPMR.directorActionReason}\n`;
    if (lastPMR.competitorsMentioned?.length) s += `\n  COMPETITORS: ${lastPMR.competitorsMentioned.join(', ')}\n`;
    s += '\n';
  }
  if (recent.length > 0) {
    s += `RECENT ACTIVITY\n`;
    recent.forEach(a => { s += `  · ${fmtDateShort(a.date)} ${a.type}: ${a.summary}\n`; });
    s += '\n';
  }
  if (pendingQuotes.length > 0) {
    s += `OPEN QUOTATIONS\n`;
    pendingQuotes.forEach(q => { s += `  · ${q.refNo} — ${fmtMoney(q.amount, q.currency)}\n    ${q.product}\n`; });
    s += '\n';
  }
  s += `TALKING POINTS\n`;
  s += `  · Confirm decision timeline${pendingQuotes.length ? ' on open quote(s)' : ''}\n`;
  s += `  · Reinforce technical strengths: ${company.products.slice(0, 2).join(', ')}\n`;
  if (company.heat === 'Amber' || company.heat === 'Red') s += `  · Address the relationship cooling — ask what's changed\n`;
  if (lastPMR?.competitorsMentioned?.length) s += `  · Counter-position against ${lastPMR.competitorsMentioned[0]}\n`;
  s += '\nINTERNAL NOTE\n  Generated by Al Ras Intelligence. Verify before client meeting.';
  return s;
}

function buildEmailDraft(company, activities, lastPMR, owner) {
  const recent = activities[0];
  const firstName = company.primaryContact.name.split(' ')[0];
  let s = `Subject: Following up — ${company.name}\n\n`;
  s += `Dear ${firstName},\n\n`;
  if (company.heat === 'Red' || company.daysSinceActivity > 30) {
    s += `It's been a while since we connected, and I wanted to personally reach out to check in on how things are progressing at ${company.name}.\n\n`;
    s += `We've been thinking about ${company.products[0] || 'your projects'} and would value the chance to understand your current priorities — and how Al Ras Steel can be more useful to you this quarter.\n\n`;
  } else if (recent) {
    s += `Following our ${recent.type.toLowerCase()} on ${fmtDate(recent.date)}, I wanted to circle back on the points we covered.\n\n`;
    if (lastPMR?.nextSteps) s += `As discussed, next steps included: ${lastPMR.nextSteps}\n\n`;
    s += `I'd appreciate a quick update from your side on timing, and I'm happy to set up a call this week if it would help move things forward.\n\n`;
  } else {
    s += `I hope this note finds you well. I wanted to introduce myself and explore how Al Ras Steel might support ${company.name}'s requirements in ${company.products[0] || 'structural steel'}.\n\n`;
    s += `We supply across the GCC with full mill certification (EN 10204 3.2) and a strong track record with ${company.tier.split('—')[1]?.trim() || 'growth'} accounts in ${company.market}.\n\n`;
  }
  s += `Please let me know a time that works for you.\n\n`;
  s += `Warm regards,\n${owner?.name || '[Your name]'}\n${owner?.role || ''} · Al Ras Steel\n${owner?.email || ''}\n\n`;
  s += `— DRAFT — Review and personalise before sending.`;
  return s;
}

    <div>
      <label className="block text-[10px] uppercase tracking-widest text-slate-500 mb-1 font-mono">{label}{required && <span className="text-red-500 ml-0.5">*</span>}</label>
      <textarea value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} rows={3} className="w-full px-3 py-2.5 bg-white border border-slate-200 focus:border-slate-900 focus:outline-none transition text-sm resize-none" />
    </div>
  );
}
function Select({ label, value, onChange, options }) {
  const normalised = options.map(o => typeof o === 'string' ? { value: o, label: o } : o);
  return (
    <div>
      <label className="block text-[10px] uppercase tracking-widest text-slate-500 mb-1 font-mono">{label}</label>
      <select value={value} onChange={(e) => onChange(e.target.value)} className="w-full px-3 py-2.5 bg-white border border-slate-200 focus:border-slate-900 focus:outline-none transition text-sm appearance-none">
        {normalised.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
